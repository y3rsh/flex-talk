name: Publish Flex Client

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Optional explicit DateVer version (e.g. 2026.3.29-r120.1)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-flex-client-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flex-client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@y3rsh"

      - name: Install dependencies
        run: npm ci

      - name: Validate package
        run: npm run typecheck && npm test

      - name: Resolve DateVer
        id: version
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            DATEVER="$(date -u +'%Y.%-m.%-d')"
            VERSION="${DATEVER}-r${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          fi

          node -e "const v=process.argv[1]; const ok=/^[0-9]+\\.[0-9]+\\.[0-9]+(-[0-9A-Za-z.-]+)?$/.test(v); if(!ok){console.error('Invalid semver/datever:', v); process.exit(1);}" "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Set package version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish
