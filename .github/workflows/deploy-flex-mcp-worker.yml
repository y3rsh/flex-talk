name: Deploy Flex MCP Worker

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-flex-mcp-worker.yml"
      - "packages/flex-mcp-worker/**"
      - "packages/flex-tools-core/**"
      - "packages/flex-mcp-server/**"
      - "packages/flex-client/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-flex-mcp-worker-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flex-mcp-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Validate worker
        run: npm run typecheck

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config packages/flex-mcp-worker/wrangler.toml
