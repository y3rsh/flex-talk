name: Publish Flex Tools Core

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-flex-tools-core.yml"
      - "packages/flex-tools-core/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Optional explicit DateVer version (e.g. 2026.3.29-r120.1)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: publish-flex-tools-core-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flex-tools-core

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build and link local flex-client for validation
        run: |
          pushd ../flex-client
          npm ci
          npm run build
          popd
          npm install --no-save ../flex-client

      - name: Validate package
        run: npm run typecheck && npm run build

      - name: Resolve DateVer
        id: version
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            DATEVER="$(date -u +'%Y.%-m.%-d')"
            VERSION="${DATEVER}-r${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          fi

          node -e "const v=process.argv[1]; const ok=/^[0-9]+\\.[0-9]+\\.[0-9]+(-[0-9A-Za-z.-]+)?$/.test(v); if(!ok){console.error('Invalid semver/datever:', v); process.exit(1);}" "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Set package version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Publish to npmjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
